spring.application.name=placement-ai-project
server.port=8083
spring.data.mongodb.uri=mongodb://localhost:27017/placement_ai_db
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Hugging Face API Configuration
huggingface.api.url=https://api-inference.huggingface.co/models/
huggingface.api.key=your_api_key_here
huggingface.model.resume=sentence-transformers/all-MiniLM-L6-v2
huggingface.model.chat=mistralai/Mistral-7B-Instruct-v0.2
